<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Psicología</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="chat-container">
    <h1>Chatbot de Triaje Psicológico</h1>
    <div id="chat-box" class="chat-box"></div>
    <div id="quick-replies" class="quick-replies"></div>
    <div class="input-row">
      <input id="user-input" type="text" placeholder="Escribe tu mensaje..." />
      <button id="send-btn">Enviar</button>
      <button id="reset-btn" class="secondary">Reiniciar</button>
    </div>
  </main>
  <script src="./app.js"></script>
</body>
</html>
